<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026년 거래처별 매출 현황</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #16161f; --surface2: #1e1e2a;
    --border: #2a2a3a; --border2: #333345;
    --text: #f0f0f5; --text2: #9090a8; --text3: #555568;
    --accent: #6366f1; --accent2: #818cf8; --accent-glow: rgba(99,102,241,0.2);
    --green: #34d399; --red: #f87171; --blue: #60a5fa;
  }
  @keyframes gradientShift {
    0%,100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }
  @keyframes borderGlow {
    0%,100% { box-shadow: 0 0 8px rgba(99,102,241,0.2), inset 0 0 8px rgba(99,102,241,0.05); }
    50% { box-shadow: 0 0 20px rgba(99,102,241,0.45), inset 0 0 12px rgba(99,102,241,0.1); }
  }
  @keyframes chipPulse {
    0%,100% { box-shadow: 0 0 0px rgba(99,102,241,0); }
    50% { box-shadow: 0 0 8px rgba(99,102,241,0.5); }
  }
  @keyframes topBarShimmer {
    0% { background-position: -400px 0; }
    100% { background-position: 400px 0; }
  }
  @keyframes floatUp {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-3px); }
  }
  body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
  body::before { content: ''; position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 1000px; height: 500px; background: radial-gradient(ellipse, rgba(99,102,241,0.18) 0%, rgba(200,120,32,0.06) 40%, transparent 70%); pointer-events: none; z-index: 0; animation: floatUp 6s ease-in-out infinite; }
  body::after { content: ''; position: fixed; bottom: -100px; right: -100px; width: 500px; height: 500px; background: radial-gradient(ellipse, rgba(200,120,32,0.07) 0%, transparent 65%); pointer-events: none; z-index: 0; }

  .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border); flex-shrink: 0; position: relative; z-index: 1; background: linear-gradient(90deg, rgba(99,102,241,0.05) 0%, transparent 50%, rgba(200,120,32,0.04) 100%); }
  .top-left { display: flex; align-items: center; gap: 12px; }
  .badge { display: inline-flex; align-items: center; gap: 5px; background: linear-gradient(135deg, rgba(99,102,241,0.18), rgba(200,120,32,0.1)); border: 1px solid rgba(99,102,241,0.4); border-radius: 20px; padding: 3px 10px; font-size: 11px; color: var(--accent2); font-weight: 500; animation: borderGlow 3s ease-in-out infinite; }
  .badge .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  .top-title { font-size: 18px; font-weight: 700; letter-spacing: -0.4px; }
  .refresh-btn { display: flex; align-items: center; gap: 6px; padding: 6px 13px; border-radius: 8px; border: 1px solid var(--border2); background: var(--surface); font-family: inherit; font-size: 11px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all .2s; }
  .refresh-btn:hover { border-color: var(--accent); color: var(--accent); box-shadow: 0 0 14px rgba(99,102,241,0.3); }
  .refresh-btn.loading svg { animation: spin .7s linear infinite; }
  .refresh-btn.loading { opacity: .6; pointer-events: none; }

  .main { display: flex; flex: 1; overflow: hidden; position: relative; z-index: 1; }

  .left-panel { width: 320px; flex-shrink: 0; border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 14px; gap: 10px; overflow: hidden; }
  .panel-meta { font-size: 13px; color: var(--text3); }
  .panel-meta b { color: var(--accent2); }
  .search-wrap { position: relative; }
  .search-wrap svg { position: absolute; left: 8px; top: 50%; transform: translateY(-50%); color: var(--text3); }
  #searchInput { width: 100%; padding: 8px 10px 8px 30px; border: 1px solid var(--border); border-radius: 8px; background: var(--surface2); font-family: inherit; font-size: 14px; color: var(--text); outline: none; transition: all .2s; }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--text3); }
  .chip-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 2px; }
  .chip-list::-webkit-scrollbar { width: 2px; }
  .chip-list::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }
  .chip { padding: 8px 12px; border-radius: 7px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid transparent; color: var(--text2); background: transparent; transition: all .15s; white-space: normal; word-break: keep-all; user-select: none; line-height: 1.5; min-height: 36px; display: flex; align-items: center; }
  .chip:hover { background: var(--surface2); color: var(--text); }
  .chip.active { background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(99,102,241,0.08)); color: var(--accent2); border-color: rgba(99,102,241,0.5); animation: chipPulse 2.5s ease-in-out infinite; }
  .ctrl-row { display: flex; gap: 5px; flex-shrink: 0; }
  .ctrl-btn { flex: 1; padding: 7px; border-radius: 7px; border: 1px solid var(--border); background: var(--surface); font-family: inherit; font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all .15s; text-align: center; }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent2); }
  .ctrl-btn.active { background: rgba(99,102,241,0.15); color: var(--accent2); border-color: rgba(99,102,241,0.3); }
  .ctrl-btn.danger:hover { border-color: var(--red); color: var(--red); }

  .right-panel { flex: 1; display: flex; flex-direction: column; padding: 20px 24px; overflow: hidden; gap: 14px; position: relative; }

  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--text3); font-size: 13px; }

  .chart-title { font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
  .chart-sub { font-size: 14px; color: var(--text3); margin-top: 1px; }

  .stats { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; flex-shrink: 0; }
  .sc { background: linear-gradient(135deg, var(--surface2), #16161f); border: 1px solid var(--border); border-radius: 8px; padding: 14px 18px; transition: all .25s; cursor: default; }
  .sc:hover { border-color: rgba(99,102,241,0.4); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(99,102,241,0.12); }
  .sc-label { font-size: 14px; color: var(--text2); }
  .sc-value { font-size: 17px; font-weight: 700; color: var(--text); margin-top: 5px; }
  .sc.hi { border-color: rgba(248,113,113,0.35); background: linear-gradient(135deg, rgba(248,113,113,0.08), var(--surface2)); }
  .sc.hi:hover { box-shadow: 0 4px 16px rgba(248,113,113,0.15); border-color: rgba(248,113,113,0.6); }
  .sc.hi .sc-label { color: var(--red); }
  .sc.hi .sc-value { color: var(--red); }
  .sc.lo { border-color: rgba(96,165,250,0.35); background: linear-gradient(135deg, rgba(96,165,250,0.08), var(--surface2)); }
  .sc.lo:hover { box-shadow: 0 4px 16px rgba(96,165,250,0.15); border-color: rgba(96,165,250,0.6); }
  .sc.lo .sc-label { color: var(--blue); }
  .sc.lo .sc-value { color: var(--blue); }
  .sc.up .sc-value { color: var(--green); }
  .sc.down .sc-value { color: var(--red); }
  .sc.recent { border-color: rgba(99,102,241,0.4); background: linear-gradient(135deg, rgba(99,102,241,0.1), var(--surface2)); animation: borderGlow 3s ease-in-out infinite; }
  .sc.recent .sc-label { color: var(--accent2); }
  .sc.recent .sc-value { color: var(--accent2); }

  .qrow { display: flex; gap: 4px; flex-shrink: 0; }
  .qbtn { flex: 1; padding: 7px 4px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface); font-family: inherit; font-size: 14px; font-weight: 500; color: var(--text2); text-align: center; cursor: pointer; transition: all .15s; }
  .qbtn:hover { border-color: var(--accent); color: var(--accent2); }
  .qbtn.active { background: linear-gradient(135deg, rgba(99,102,241,0.2), rgba(99,102,241,0.05)); color: var(--accent2); border-color: rgba(99,102,241,0.5); box-shadow: 0 0 12px rgba(99,102,241,0.2); }
  .qbtn .qamt { font-size: 13px; color: var(--text3); margin-top: 1px; }
  .qbtn.active .qamt { color: var(--accent2); }

  .chart-wrap { flex: 1; position: relative; min-height: 0; }
  .chart-watermark {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-60%, -55%);
    width: 360px;
    opacity: 0.17;
    pointer-events: none;
    z-index: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .compare-legend { display: flex; flex-wrap: wrap; gap: 8px; flex-shrink: 0; padding-top: 6px; border-top: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--text2); }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .loading-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; }
  .loader { width: 36px; height: 36px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }
  .loading-text { color: var(--text2); font-size: 13px; }

  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:none} }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-left">
    <div class="badge"><span class="dot"></span> LIVE · 노션 연동</div>
    <span class="top-title">2026년 거래처별 매출 현황</span>
  </div>
  <button class="refresh-btn" onclick="reloadData()" id="refreshBtn">
    <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
      <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
    </svg>새로고침
  </button>
</div>

<div class="main" id="mainArea">
  <div class="loading-state">
    <div class="loader"></div>
    <div class="loading-text">노션에서 데이터를 불러오는 중...</div>
  </div>
</div>

<script>
Chart.register(ChartDataLabels);
const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const COLORS = ['#6366f1','#f87171','#34d399','#fbbf24','#a78bfa','#38bdf8','#fb7185','#4ade80','#fb923c','#818cf8','#f472b6','#2dd4bf','#facc15','#60a5fa','#c084fc'];

let DATA = {}, mode = 'single', selected = [], chartInst = null;

async function fetchData() {
  const res = await fetch('/api/notion', { method: 'POST' });
  if (!res.ok) throw new Error(`API 오류: ${res.status}`);
  return await res.json();
}

const fmt = n => n.toLocaleString('ko-KR') + '원';
const fmtW = n => {
  if(n >= 100000000) return (n/100000000).toFixed(1) + '억원';
  if(n >= 10000) return Math.round(n/10000).toLocaleString('ko-KR') + '만원';
  return n.toLocaleString('ko-KR') + '원';
};
const fmtWShort = n => {
  if(n >= 100000000) return (n/100000000).toFixed(1) + '억원';
  if(n >= 10000) return Math.round(n/10000) + '만원';
  return n.toLocaleString('ko-KR') + '원';
};

function getStats(vals) {
  const real = vals.map((v,i)=>({v,i})).filter(x=>x.v>0);
  if(!real.length) return null;
  const total = real.reduce((s,x)=>s+x.v,0);
  const avg = Math.round(total/real.length);
  const maxItem = real.reduce((a,b)=>a.v>b.v?a:b);
  const minItem = real.reduce((a,b)=>a.v<b.v?a:b);
  const last = real[real.length-1];
  const prev = real.length>1 ? real[real.length-2] : null;
  const trend = prev ? Math.round((last.v-prev.v)/prev.v*100) : null;
  const quarters = [0,1,2,3].map(q => {
    const qMonths = real.filter(x => Math.floor(x.i/3)===q);
    if(!qMonths.length) return null;
    return Math.round(qMonths.reduce((s,x)=>s+x.v,0)/qMonths.length);
  });
  const trendAmt = prev ? last.v - prev.v : null;
  return { avg, maxItem, minItem, last, trend, trendAmt, quarters };
}

function buildUI() {
  const names = Object.keys(DATA).sort((a,b) => a.localeCompare(b,'ko'));
  const now = new Date();
  const timeStr = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  document.getElementById('mainArea').innerHTML = `
    <div class="left-panel">
      <div class="panel-meta">총 <b>${names.length}</b>개 · ${timeStr}</div>
      <div class="search-wrap">
        <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input type="text" id="searchInput" placeholder="검색..." oninput="filterChips()">
      </div>
      <div class="chip-list" id="chipList">
        ${names.map(n => `<div class="chip" data-name="${n}" onclick="toggleChip('${n}')" title="${n}">${n}</div>`).join('')}
      </div>
      <div class="ctrl-row">
        <div class="ctrl-btn active" onclick="setMode('single')" id="btnSingle">단일</div>
        <div class="ctrl-btn" onclick="setMode('compare')" id="btnCompare">비교</div>
        <div class="ctrl-btn danger" onclick="clearAll()">초기화</div>
      </div>
    </div>
    <div class="right-panel" id="rightPanel">
      <div class="empty-state">
        📈 왼쪽에서 거래처를 선택해 주세요
      </div>
    </div>`;
}

async function reloadData() {
  const btn = document.getElementById('refreshBtn');
  if(btn) btn.classList.add('loading');
  try {
    DATA = await fetchData();
    selected = selected.filter(n => DATA[n]);
    buildUI();
    updateChipStates();
    if(selected.length) renderChart();
  } catch(e) {
    if(btn) btn.classList.remove('loading');
    alert('불러오기 실패: ' + e.message);
  }
}

function filterChips() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.chip').forEach(c => { c.style.display = c.dataset.name.toLowerCase().includes(q) ? '' : 'none'; });
}

function setMode(m) {
  mode = m;
  document.getElementById('btnSingle').classList.toggle('active', m==='single');
  document.getElementById('btnCompare').classList.toggle('active', m==='compare');
  if(m==='single' && selected.length > 1) { selected=[selected[0]]; updateChipStates(); renderChart(); }
}

function clearAll() { selected=[]; updateChipStates(); renderChart(); }

function toggleChip(name) {
  if(mode==='single') { selected = selected[0]===name ? [] : [name]; }
  else { const i=selected.indexOf(name); if(i>=0) selected.splice(i,1); else if(selected.length<8) selected.push(name); }
  updateChipStates(); renderChart();
}

function updateChipStates() {
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', selected.includes(c.dataset.name)));
}

function renderChart() {
  const panel = document.getElementById('rightPanel');
  if(!panel) return;

  if(!selected.length) {
    if(chartInst){chartInst.destroy();chartInst=null;}
    panel.innerHTML=`<div class="empty-state">📈 왼쪽에서 거래처를 선택해 주세요</div>`;
    return;
  }

  const isSingle = selected.length===1;
  const stats = isSingle ? getStats(DATA[selected[0]]) : null;

  let statsHTML = '', qrowHTML = '';
  if(isSingle && stats) {
    const isUp = stats.trend > 0;
    const isDown = stats.trend < 0;
    const trendPct = stats.trend!==null?(isUp?`▲${stats.trend}%`:`▼${Math.abs(stats.trend)}%`):'-';
    const trendAmtTxt = stats.trendAmt!==null?(isUp?`+ ${fmtW(stats.trendAmt)}`:`- ${fmtW(Math.abs(stats.trendAmt))}`):'-';
    const trendColor = isUp?'var(--red)':isDown?'var(--blue)':'var(--text)';
    statsHTML = `<div class="stats">
      <div class="sc"><div class="sc-label">월평균 매출</div><div class="sc-value">${fmtW(stats.avg)}</div></div>
      <div class="sc hi"><div class="sc-label">최고매출</div><div class="sc-value">${MONTHS[stats.maxItem.i]} ${fmtW(stats.maxItem.v)}</div></div>
      <div class="sc lo"><div class="sc-label">최저매출</div><div class="sc-value">${MONTHS[stats.minItem.i]} ${fmtW(stats.minItem.v)}</div></div>
      <div class="sc"><div class="sc-label">전월比</div><div class="sc-value" style="color:${trendColor}">${trendPct}<br><span style="font-size:12px;font-weight:500">${trendAmtTxt}</span></div></div>
      <div class="sc recent"><div class="sc-label">최근 매출 현황</div><div class="sc-value">${MONTHS[stats.last.i]} ${fmtW(stats.last.v)}</div></div>
    </div>`;
    qrowHTML = `<div class="qrow" id="qrow">
      ${stats.quarters.map((q,i) => `
        <div class="qbtn${i===0?' active':''}" data-q="${i}" onclick="selectQ(this)">
          ${i+1}분기<div class="qamt">${q!==null?'평균 '+fmtW(q):'데이터 없음'}</div>
        </div>`).join('')}
    </div>`;
  }

  const legendHTML = !isSingle ? `<div class="compare-legend">${selected.map((n,i)=>`
    <div class="legend-item"><div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div>${n}</div>`).join('')}</div>` : '';

  panel.innerHTML = `
    <div style="animation:fadeIn .3s ease">
      <div class="chart-title">${isSingle ? selected[0] : '거래처 비교'}</div>
      <div class="chart-sub">${isSingle ? '월별 매출 추이' : selected.length+'개 거래처 비교'}</div>
    </div>

  if(chartInst){chartInst.destroy();}
  const ctx = document.getElementById('mainChart').getContext('2d');

  const datasets = selected.map((n,i) => {
    const color = COLORS[i%COLORS.length];
    const d = DATA[n];
    const plotData = d.map(v => v>0 ? v : null);
    const st = getStats(d);
    return {
      label: n, data: plotData,
      borderColor: color,
      backgroundColor: isSingle ? ctx2 => {
        const g = ctx2.chart.ctx.createLinearGradient(0,0,0,ctx2.chart.height);
        g.addColorStop(0, color+'40'); g.addColorStop(1, color+'00'); return g;
      } : color+'18',
      borderWidth: 2.5,
      pointBackgroundColor: plotData.map((v,idx) => {
        if(v===null) return color;
        if(isSingle && st) {
          if(idx===st.maxItem.i) return '#f87171';
          if(idx===st.minItem.i) return '#60a5fa';
        }
        return color;
      }),
      pointBorderColor: '#0a0a0f', pointBorderWidth: 2,
      pointRadius: plotData.map(v => v!==null ? 5 : 0),
      pointHoverRadius: 8, tension: 0.4, fill: isSingle, spanGaps: false,
      datalabels: {
        display: ctx => ctx.dataset.data[ctx.dataIndex] !== null,
        align: 'top', anchor: 'end', offset: 4,
        color: (ctx) => {
          if(!isSingle || !st) return color;
          const idx = ctx.dataIndex;
          if(idx===st.maxItem.i) return '#f87171';
          if(idx===st.minItem.i) return '#60a5fa';
          return color;
        },
        font: {family:'Noto Sans KR', size: isSingle?11:9, weight:'700'},
        formatter: v => v!==null ? fmtWShort(v) : '',
        backgroundColor: 'rgba(10,10,15,0.82)',
        borderColor: ctx => {
          if(!isSingle || !st) return color+'50';
          const idx = ctx.dataIndex;
          if(idx===st.maxItem.i) return '#f8717150';
          if(idx===st.minItem.i) return '#60a5fa50';
          return color+'50';
        },
        borderWidth: 1, borderRadius: 4,
        padding: {top:2,bottom:2,left:5,right:5},
      }
    };
  });

  chartInst = new Chart(ctx, {
    type: 'line',
    data: { labels: MONTHS, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      animation: { duration: 600, easing: 'easeInOutQuart' },

function selectQ(el) {
  document.querySelectorAll('.qbtn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}

(async () => {
  try { DATA = await fetchData(); buildUI(); }
  catch(e) {
    document.getElementById('mainArea').innerHTML = `
      <div style="flex:1;display:flex;align-items:center;justify-content:center;width:100%">
        <div style="text-align:center;padding:40px;background:rgba(248,113,113,0.06);border:1px solid rgba(248,113,113,0.2);border-radius:12px;color:#f87171;">
          ❌ 데이터 불러오기 실패<br><br>
          <small style="color:rgba(248,113,113,0.7)">${e.message}</small><br><br>
          <button onclick="location.reload()" style="margin-top:10px;padding:8px 18px;border-radius:8px;border:1px solid rgba(248,113,113,0.4);background:rgba(248,113,113,0.1);color:#f87171;cursor:pointer;font-family:inherit;">다시 시도</button>
        </div>
      </div>`;
  }
})();
