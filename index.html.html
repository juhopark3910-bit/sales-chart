<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>거래처별 매출 현황</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/chartjs-plugin-datalabels/2.2.0/chartjs-plugin-datalabels.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f7f6f3;
    --surface: #ffffff;
    --border: #e8e6e0;
    --text-primary: #1a1916;
    --text-secondary: #6b6860;
    --text-muted: #a8a59e;
    --accent: #2563eb;
    --up: #16a34a;
    --down: #dc2626;
    --chip-bg: #f0ede8;
  }
  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 24px 20px;
  }
  .header { margin-bottom: 20px; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .header p { font-size: 13px; color: var(--text-secondary); margin-top: 3px; }

  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-wrap svg { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-muted); }
  #searchInput {
    width: 100%; padding: 10px 12px 10px 36px;
    border: 1px solid var(--border); border-radius: 8px;
    background: var(--surface); font-family: inherit;
    font-size: 14px; color: var(--text-primary); outline: none; transition: border-color .15s;
  }
  #searchInput:focus { border-color: var(--accent); }
  #searchInput::placeholder { color: var(--text-muted); }

  .chip-list {
    display: flex; flex-wrap: wrap; gap: 6px;
    margin-bottom: 16px; max-height: 200px; overflow-y: auto;
  }
  .chip {
    padding: 5px 12px; border-radius: 20px;
    background: var(--chip-bg); color: var(--text-secondary);
    font-size: 12px; font-weight: 500; cursor: pointer;
    border: 1.5px solid transparent; transition: all .15s;
    white-space: nowrap; user-select: none;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }
  .chip.active { background: #1a1916; color: #fff; border-color: #1a1916; }

  .controls { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
  .ctrl-btn {
    padding: 6px 14px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface);
    font-family: inherit; font-size: 12px; font-weight: 500;
    color: var(--text-secondary); cursor: pointer; transition: all .15s;
  }
  .ctrl-btn:hover { border-color: var(--accent); color: var(--accent); }
  .ctrl-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .sel-count { font-size: 12px; color: var(--text-muted); margin-left: auto; }
  .sel-count b { color: var(--accent); }

  .chart-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px; margin-bottom: 16px;
  }
  .chart-header {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 16px; flex-wrap: wrap; gap: 8px;
  }
  .chart-title { font-size: 16px; font-weight: 700; }
  .chart-sub { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  .stat-chips { display: flex; gap: 8px; flex-wrap: wrap; }
  .stat-chip {
    background: var(--chip-bg); border-radius: 6px;
    padding: 4px 10px; font-size: 12px; color: var(--text-secondary); font-weight: 500;
  }
  .stat-chip span { font-weight: 700; color: var(--text-primary); }
  .stat-chip.up span { color: var(--up); }
  .stat-chip.down span { color: var(--down); }
  /* 라벨이 잘리지 않도록 차트 상단 여백 충분히 확보 */
  .chart-wrap { position: relative; height: 340px; }
  .compare-legend {
    display: flex; flex-wrap: wrap; gap: 10px;
    margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border);
  }
  .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
  .legend-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 14px; }
  .empty-state .icon { font-size: 36px; margin-bottom: 10px; }
</style>
</head>
<body>

<div class="header">
  <h1>거래처별 매출 현황</h1>
  <p>2026년 · 거래처를 선택하면 월별 매출 추이를 확인할 수 있습니다</p>
</div>

<div class="search-wrap">
  <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
    <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
  </svg>
  <input type="text" id="searchInput" placeholder="거래처명 검색..." oninput="filterChips()">
</div>

<div class="chip-list" id="chipList"></div>

<div class="controls">
  <button class="ctrl-btn active" onclick="setMode('single')" id="btnSingle">단일 선택</button>
  <button class="ctrl-btn" onclick="setMode('compare')" id="btnCompare">비교 모드</button>
  <button class="ctrl-btn" onclick="clearAll()">초기화</button>
  <span class="sel-count" id="selCount"></span>
</div>

<div id="chartArea">
  <div class="empty-state">
    <div class="icon">📈</div>
    위에서 거래처를 선택해 주세요
  </div>
</div>

<script>
Chart.register(ChartDataLabels);

const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];

const DATA = {
  "강남의원":              [535497,465300,619523,0,0,0,0,0,0,0,0,0],
  "강북삼성의원":          [803082,602069,499471,0,0,0,0,0,0,0,0,0],
  "강북서울이비인후과의원": [2119062,1809367,2059012,0,0,0,0,0,0,0,0,0],
  "김영재내과의원":        [14623490,13188950,15525518,0,0,0,0,0,0,0,0,0],
  "내일내과의원(강북)":    [2749650,2703137,1844686,0,0,0,0,0,0,0,0,0],
  "늘푸른연세의원":        [1412262,553796,1152495,0,0,0,0,0,0,0,0,0],
  "동서제일의원":          [2472729,1952365,2097346,0,0,0,0,0,0,0,0,0],
  "맑은하늘마취통증의학과": [94882,147093,159201,0,0,0,0,0,0,0,0,0],
  "배용표내과":            [450002,852379,870479,0,0,0,0,0,0,0,0,0],
  "북부성모의원(임)":      [1540925,2196574,2027772,0,0,0,0,0,0,0,0,0],
  "서울더블유W내과의원":   [2118224,1457702,1500000,0,0,0,0,0,0,0,0,0],
  "서울류내과의원":        [2972806,3131649,2967983,0,0,0,0,0,0,0,0,0],
  "서울바른내과의원":      [1819719,1828580,1743054,0,0,0,0,0,0,0,0,0],
  "서울봄연합의원":        [7257019,6492119,6031703,0,0,0,0,0,0,0,0,0],
  "서울에이치내과의원":    [948703,1070946,1062238,0,0,0,0,0,0,0,0,0],
  "서울연세튼튼의원":      [492227,441232,1007970,0,0,0,0,0,0,0,0,0],
  "서울우리내과의원":      [14091864,13303853,12510482,0,0,0,0,0,0,0,0,0],
  "성모더원신경외과의원":  [0,53149,127118,0,0,0,0,0,0,0,0,0],
  "송림외과의원":          [3665074,4681950,3538594,0,0,0,0,0,0,0,0,0],
  "수민의원":              [477259,597592,547836,0,0,0,0,0,0,0,0,0],
  "수안과의원":            [534486,820534,773902,0,0,0,0,0,0,0,0,0],
  "수유탑내과의원":        [2923247,2653755,2983346,0,0,0,0,0,0,0,0,0],
  "스마일내과의원":        [7799199,6143859,7286220,0,0,0,0,0,0,0,0,0],
  "심외과":                [332593,446273,516241,0,0,0,0,0,0,0,0,0],
  "엠에스아산내과의원":    [3008445,2294861,3211842,0,0,0,0,0,0,0,0,0],
  "연세백세내과의원":      [5650091,5855943,5339521,0,0,0,0,0,0,0,0,0],
  "연진내과의원":          [570099,591013,572645,0,0,0,0,0,0,0,0,0],
  "예일소아과의원":        [1736451,1481910,1528200,0,0,0,0,0,0,0,0,0],
  "우리베스트내과의원":    [1130438,743051,1628468,0,0,0,0,0,0,0,0,0],
  "우이한솔의원":          [9725165,9226341,8473803,0,0,0,0,0,0,0,0,0],
  "이광언내과의원":        [1077333,953073,864502,0,0,0,0,0,0,0,0,0],
  "이창훈신경과의원":      [6782427,5855428,5971198,0,0,0,0,0,0,0,0,0],
  "자애내과외과의원":      [4143574,3662579,3740599,0,0,0,0,0,0,0,0,0],
  "차성수의원":            [1459978,1106752,1852252,0,0,0,0,0,0,0,0,0],
  "참조은의원":            [4089705,4178415,4178415,0,0,0,0,0,0,0,0,0],
  "최윤영내과의원":        [1334759,1058274,1871839,0,0,0,0,0,0,0,0,0],
  "한걸음가정의학과의원":  [1881709,1890457,2053568,0,0,0,0,0,0,0,0,0],
  "한마음의원":            [1156032,935814,1219804,0,0,0,0,0,0,0,0,0],
  "한사랑의원":            [2386920,2589308,2386562,0,0,0,0,0,0,0,0,0],
  "현의원":                [4090261,4230714,4918443,0,0,0,0,0,0,0,0,0],
};

const COLORS = [
  '#2563eb','#dc2626','#16a34a','#d97706','#7c3aed',
  '#0891b2','#be185d','#065f46','#92400e','#1e3a8a',
  '#991b1b','#3730a3','#166534','#78350f','#0369a1',
];

const names = Object.keys(DATA);
let mode = 'single', selected = [], chartInst = null;

function buildChips() {
  document.getElementById('chipList').innerHTML =
    names.map(n => `<div class="chip" data-name="${n}" onclick="toggleChip('${n}')">${n}</div>`).join('');
}

function filterChips() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  document.querySelectorAll('.chip').forEach(c => {
    c.style.display = c.dataset.name.toLowerCase().includes(q) ? '' : 'none';
  });
}

function setMode(m) {
  mode = m;
  document.getElementById('btnSingle').classList.toggle('active', m==='single');
  document.getElementById('btnCompare').classList.toggle('active', m==='compare');
  if(m==='single' && selected.length > 1) { selected = [selected[0]]; updateChipStates(); renderChart(); }
}

function clearAll() { selected = []; updateChipStates(); renderChart(); }

function toggleChip(name) {
  if(mode === 'single') {
    selected = selected[0] === name ? [] : [name];
  } else {
    const idx = selected.indexOf(name);
    if(idx >= 0) selected.splice(idx, 1);
    else if(selected.length < 8) selected.push(name);
  }
  updateChipStates();
  renderChart();
}

function updateChipStates() {
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', selected.includes(c.dataset.name)));
  const cnt = document.getElementById('selCount');
  cnt.innerHTML = selected.length ? `<b>${selected.length}</b>개 선택됨` : '';
}

const fmt = n => n.toLocaleString('ko-KR');
const fmtShort = n => {
  if(n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if(n >= 1000) return (n/1000).toFixed(0) + 'K';
  return n.toString();
};

function getStats(vals) {
  const real = vals.map((v,i)=>({v,i})).filter(x=>x.v>0);
  if(!real.length) return null;
  const total = real.reduce((s,x)=>s+x.v,0);
  const avg = Math.round(total/real.length);
  const maxItem = real.reduce((a,b)=>a.v>b.v?a:b);
  const last = real[real.length-1].v;
  const prev = real.length > 1 ? real[real.length-2].v : null;
  const trend = prev ? Math.round((last-prev)/prev*100) : null;
  return { total, avg, max: maxItem.v, maxIdx: maxItem.i, trend };
}

function renderChart() {
  const area = document.getElementById('chartArea');
  if(!selected.length) {
    if(chartInst) { chartInst.destroy(); chartInst=null; }
    area.innerHTML = `<div class="empty-state"><div class="icon">📈</div>위에서 거래처를 선택해 주세요</div>`;
    return;
  }

  const isSingle = selected.length === 1;
  const stats = isSingle ? getStats(DATA[selected[0]]) : null;

  let statsHTML = '';
  if(isSingle && stats) {
    const trendCls = stats.trend > 0 ? 'up' : stats.trend < 0 ? 'down' : '';
    const trendTxt = stats.trend !== null ? (stats.trend > 0 ? `▲${stats.trend}%` : `▼${Math.abs(stats.trend)}%`) : '-';
    statsHTML = `<div class="stat-chips">
      <div class="stat-chip">누계 <span>${fmtShort(stats.total)}</span></div>
      <div class="stat-chip">월평균 <span>${fmtShort(stats.avg)}</span></div>
      <div class="stat-chip">최고 <span>${MONTHS[stats.maxIdx]} ${fmtShort(stats.max)}</span></div>
      <div class="stat-chip ${trendCls}">전월比 <span>${trendTxt}</span></div>
    </div>`;
  }

  let legendHTML = !isSingle ? `<div class="compare-legend">${selected.map((n,i)=>`
    <div class="legend-item"><div class="legend-dot" style="background:${COLORS[i%COLORS.length]}"></div>${n}</div>`
  ).join('')}</div>` : '';

  area.innerHTML = `<div class="chart-card">
    <div class="chart-header">
      <div>
        <div class="chart-title">${isSingle ? selected[0] : '거래처 비교'}</div>
        <div class="chart-sub">${isSingle ? '월별 매출 추이 (4월~ 입력 예정)' : selected.length+'개 거래처 비교'}</div>
      </div>
      ${statsHTML}
    </div>
    <div class="chart-wrap"><canvas id="mainChart" role="img" aria-label="월별 매출 선그래프">월별 매출</canvas></div>
    ${legendHTML}
  </div>`;

  if(chartInst) chartInst.destroy();
  const ctx = document.getElementById('mainChart').getContext('2d');

  const datasets = selected.map((n, i) => {
    const color = COLORS[i % COLORS.length];
    const d = DATA[n];
    const plotData = d.map((v, idx) => idx >= 3 ? null : (v > 0 ? v : null));
    return {
      label: n, data: plotData,
      borderColor: color,
      backgroundColor: color + '18',
      borderWidth: 2.5,
      pointBackgroundColor: color,
      pointBorderColor: '#fff',
      pointBorderWidth: 2,
      pointRadius: plotData.map(v => v !== null ? 6 : 0),
      pointHoverRadius: 8,
      tension: 0.35,
      fill: isSingle,
      spanGaps: false,
      datalabels: {
        display: ctx => ctx.dataset.data[ctx.dataIndex] !== null,
        align: 'top',
        anchor: 'end',
        offset: 4,
        color: color,
        font: {
          family: 'Noto Sans KR',
          size: isSingle ? 12 : 10,
          weight: '500',
        },
        formatter: v => v !== null ? fmtShort(v) : '',
        backgroundColor: 'rgba(255,255,255,0.85)',
        borderRadius: 4,
        padding: { top: 2, bottom: 2, left: 4, right: 4 },
      }
    };
  });

  chartInst = new Chart(ctx, {
    type: 'line',
    data: { labels: MONTHS, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      layout: { padding: { top: 36, left: 8, right: 8, bottom: 4 } },
      plugins: {
        legend: { display: false },
        datalabels: {},
        tooltip: {
          backgroundColor: '#1a1916',
          titleColor: '#a8a59e',
          bodyColor: '#ffffff',
          padding: 10,
          cornerRadius: 8,
          callbacks: {
            title: items => items[0].label,
            label: item => {
              const v = item.raw;
              if(v === null || v === undefined) return ` ${item.dataset.label}: 미입력`;
              return ` ${item.dataset.label}: ${fmt(v)}원`;
            }
          }
        }
      },
      scales: {
        x: {
          grid: { color: '#e8e6e030' },
          ticks: {
            font: { family: 'Noto Sans KR', size: 12 },
            color: '#6b6860',
            autoSkip: false,
            maxRotation: 0
          }
        },
        y: {
          grid: { color: '#e8e6e060' },
          beginAtZero: true,
          ticks: {
            font: { family: 'Noto Sans KR', size: 11 },
            color: '#6b6860',
            callback: v => v >= 1000000 ? (v/1000000).toFixed(0)+'M' : v >= 1000 ? (v/1000).toFixed(0)+'K' : v
          }
        }
      },
      interaction: { mode: 'index', intersect: false },
    }
  });
}

buildChips();
</script>
</body>
</html>
